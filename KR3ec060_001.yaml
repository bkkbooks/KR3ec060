body:
  text: 原敘本草之作肇自神農厥後代有傳書至綱目而大備然卷帙浩繁艱於記誦於是膚淺者流率以藥性賦為宗旨掛一漏百貽害無窮逮備要從新諸書行於世而後本草之功用復著顧其體例則仍以草木蟲魚分門而比類讀者但識其性味主治而於所入之經絡每多忽之此所以有誅伐無過之譏而難於收針芥相投之效也吾友山陰姚君名瀾字涴云申韓高手也由明經需次廣文余筮仕之江即延之賓館論交垂三十年間遇微病君為治之則信手拈來藥止數味而效如桴鼓詢以岐黃曰吾非知醫但知某藥入某經耳庚子之春余攝篆越郡得姚君所輯本草分經抄本公餘之暇披覽一過蓋以經絡為綱以藥品為目俾閲者豁然於某味為某經之藥不致亂投雜進其有裨於醫術不淺哉爰急為付梓以廣其傳姚吾素善病中年鬚髮盡脫因自號維摩和尚今已逾花甲而精力不衰殆即按經服藥之明效歟
