症落花生見肺補芡實甘平而澀補脾固腎助氣澀精又能解暑熱白糖甘溫補脾緩肝潤肺和中消痰治嗽多食助熱損齒生蟲冰糖同砂糖功用與白者相仿和血則砂糖為優甘薯甘平益氣強腎陰健脾胃山藥味甘性澀補脾肺清虛熱化痰涎固腸胃澀精氣兼能益腎強陰而助心氣零餘子甘溫功用強於山藥韭菜見腎補糯米甘溫補脾肺虛寒收汗澀二便性甚黏滯而難化秈米甘溫和脾養胃益氣溫中除濕米仁見胃補扁豆見胃補飴糖甘溫益氣補中緩脾潤肺化痰止嗽鷺鷥鹹平益脾補氣治虛瘦牛肉甘溫屬土補脾益氣安中止渴老病自死者食之損人白水牛喉治反胃腸結豬肚入胃健脾狗肉黃狗益脾黑狗補腎酸鹹溫暖脾益胃而補腰腎療虛寒助陽事兩腎陰莖尤勝孕婦食之令子啞狗寶結成狗腹中者攻反胃理疔疽屎中粟米起痘治噎屎中骨治小兒驚癇和甘草見通行和蒼朮苦溫辛烈燥胃強脾發汗除濕能升發胃中腸氣止吐瀉逐痰水辟惡氣解六郁散風寒濕治痿澤蘭苦甘辛香微溫而性和緩入肝脾血分而行血獨入血海攻擊稽留通經破瘀散郁舒脾省頭草氣香味辛性涼入氣分調氣生血養營利水除痰治消渴經所謂蘭除陳氣者此也馬蘭辛涼功同澤蘭入陽明血分廣木香見三焦和砂仁辛溫香燥和胃醒脾快氣調中通行結滯消食醒酒治痞脹散浮熱得檀香豆蔻入肺得人參益智入脾得黃柏茯苓入腎得白石脂赤石脂入大小腸能潤腎燥引諸藥歸宿丹田腎虛氣不歸元用為嚮導最為穩妥白豆蔻見肺和藿香辛甘微溫清和芳烈入脾肺快氣和中開胃止嘔去惡氣及上中二焦邪滯草豆蔻辛溫香散暖胃健脾祛寒燥濕辛燥犯血忌延胡索見肝和甘松甘溫芳香理諸氣開脾郁而善醒脾治惡氣半夏見胃和柏子仁見心和白檀香見肺和厚朴見胃和烏藥見肺和阿魏辛平入脾胃消肉積去臭氣殺蟲臭烈傷胃西番木脂熬成今以胡蒜白僞之茯苓甘淡平白者入氣分益脾寧心滲濕功專行水能通心氣於腎入肺瀉熱而下通膀胱赤茯苓入心小腸專利濕熱余與白茯苓同茯苓皮專行水烏梅見肺和廣皮見肺和佛手柑見肺和山楂酸甘微溫健脾行氣散瘀化痰消肉積乳積多食伐氣小者入藥核化食磨積治疝催生木瓜見肝和荷葉苦平裨助脾胃而升發陽氣能散瘀血留好血煨姜辛溫和中止嘔不散不燥與大棗並用以行脾胃之津液而和營衛最為平妥麻仁甘平滑利緩脾潤燥滑腸治胃熱便難去殼用穀芽見胃和蒸餅見胃和建曲見胃和甘爛水甘溫水性本咸而重若揚之至千萬遍則輕而柔故能益脾胃而不助腎氣九香蟲鹹溫治膈脘滯氣脾腎虧損壯元陽攻薑黃苦辛溫性烈入脾肝理血中之氣專於破血散結通經片子者能入手臂治痹痛草果辛熱破氣除痰消食化積制太陰獨勝之寒佐常山截瘧煨熟用仁南星見肝攻大黃見胃攻青皮見肝攻大腹皮辛溫泄肺和脾下氣行水寬胸通腸酒洗淨黑豆湯再洗煨用子辛溫澀與檳榔同功而力稍緩麥芽甘溫能助胃氣上行健脾寬腸下氣消食化積散結祛痰善通乳亦消腎氣炒用紅曲甘溫治脾胃營血破血活血燥胃消食陳者良散升麻甘辛微苦性升脾胃引經藥亦入陽明肺大腸經而表散風邪升散火鬱能升陽氣於至陰之下引甘溫之藥上行以補衛氣之散而實其表兼緩帶脈之縮急解藥毒殺精鬼緑升麻治下痢前胡見肝散防風見膀胱散葛根見胃散冰片見通行散寒黃連見心寒胡連見心寒黃芩見心寒白茅根甘寒入心脾胃涼血消瘀除熱行水引火下降針能潰膿酒蒸服一針潰一孔花止血白蘚皮苦寒性燥入脾胃兼入膀胱小腸除濕熱行水道治風痹瘡癬茵陳見膀胱寒射干見肺寒木通見小腸寒竹葉見心寒甘蔗見胃寒冬瓜甘寒瀉熱益脾利二便消水腫散熱毒子補肝明目凡藥中所用瓜子皆冬瓜子也蚺蛇膽苦甘寒涼血明目療疳殺蟲主肝脾之病又能護心止痛蚺蛇肉極腴美主治略同熱肉果辛溫氣香暖胃理脾澀大腸止虛瀉麵裹煨去油用紅豆蔻見胃熱注蘄艾見通行熱烏頭即附子之母功用與附子相同而力稍緩其性輕疏能溫脾逐風治風疾者以此為宜桂心辛甘大熱大燥補陽入心脾血分活血能引血化汗化膿為內托瘡疽之用吳茱萸見肝熱川椒見肺熱乾薑見通行熱手陽明大腸補栗見腎補牛乳甘微寒潤腸胃補虛勞解熱毒乳酥力稍遜宜於血熱枯燥之人羊乳補肺腎潤胃脘大腸之燥豬腸入大腸治腸風血痔油利腸潤燥散風解毒殺蟲滑産阿膠見肺補和砂仁見脾和連翹見心和土茯苓甘淡平去陽明濕熱以利筋骨利小便止泄瀉治楊梅瘡毒誤服輕粉成疾者服此能去輕粉之毒旋覆花見肺和榆白皮甘平滑利入大小腸膀胱利諸竅滲濕熱滑胎下有形滯物治嗽喘不眠訶子見肺和杏仁見肺和薤白辛苦溫滑泄下焦大腸氣滯散血生肌調中下氣取白用罌粟殼見肺和赤石脂甘溫酸澀體重固大小腸直入下焦陰分而固下收濕止血催生下胞衣為久痢泄澼要藥禹餘糧甘平而澀胃大腸血分重劑固下治咳逆下痢催生龍骨見心和攻大黃見胃攻皂角見肺攻雷丸苦寒入胃大腸功專消積殺蟲而能令人陰痿桃仁見肝攻元明粉辛甘鹹冷去胃中實熱蕩腸中宿垢潤燥破結用代芒硝性稍和緩芒硝辛鹹苦大寒峻下之品潤燥軟堅下泄除熱能蕩滌三焦腸胃實熱推陳致新治陽強之病無堅不破無熱不除又能消化金石誤用伐下焦真陰朴硝性味功用與芒硝同而尤為酷澀性急芒硝經煉故稍緩散升麻見脾散秦艽見肝散白芷見肺散麻黃見肺散寒黃芩見心寒白頭翁苦寒入胃大腸血分堅腎涼血瀉熱漏盧見胃寒鮮生地見腎寒木通見小腸寒山豆根見心寒馬兜鈴見肺寒薔薇根苦澀而冷入胃大腸除風熱濕熱殺蟲子名營實酸溫主治略同槐實即槐角苦寒純陰清肝膽涼大腸瀉風熱槐花苦涼瀉熱涼血功同槐實陳者良川楝根見肝寒注柿見肺寒梨見肺寒熱肉果見脾熱蓽茇見胃熱吳茱萸見肝熱石硫黃酸毒大熱補命門真火不足而又能疏利大腸暖精壯陽殺蟲療瘡救危之藥服之多發背疽土硫黃辛熱腥臭止入瘡藥不堪服食足陽明胃補黨參見脾補黃精見通行補黃耆見肺補天生術見脾補益智仁見脾補甘薯見脾補韭菜見腎補米仁甘淡微寒而力和緩益胃健脾滲濕行水清肺熱殺蛔扁豆甘平中和輕清緩補調脾和胃通利三焦降濁升清除濕能消脾胃之暑專治中宮之病炒則微溫多食壅氣葉治霍亂吐瀉秈米見脾補燕窩見肺補野鴨甘涼補中益氣平胃消食大益病人治熱毒療瘡癤能殺臟腹蟲牛乳見大腸補羊乳見大腸補豬肚見脾補和甘草見通行和蒼朮見脾和三七甘苦微溫散瘀定痛能損新血治吐衄癰腫金瘡杖瘡大抵陽明厥陰血分之藥馬蘭見脾和注砂仁見脾和白豆蔻見肺和草豆蔻見脾和半夏辛溫體滑性燥和胃健脾兼行膽經發表開鬱下氣止嘔除濕痰利二便能行水氣以潤腎燥和胃氣而通陰陽治一切脾濕之症血家渴家汗家慎用肺燥者不可誤服須制用亦有造麴者土茯苓見大腸和萆薢甘苦平入肝胃祛風去濕以固下焦堅筋骨凡陽明濕熱流入下焦者此能去濁分清有黃白二種白者良名粉萆薢菝葜主治與萆薢土茯苓略同似系一類數種也石斛甘淡微咸微寒清胃中虛熱逐皮膚邪熱虛而有火者宜之味苦者名木斛服之損人白米飯草見肺和松子見肺和厚朴苦辛溫入脾胃瀉實滿散濕滿平胃調中消痰化食破宿血散風寒殺臟蟲治一切客寒犯胃濕氣侵脾之症白檀香見肺和阿魏見脾和木瓜見肝和荷葉見脾和煨姜見脾和小茴香辛平理氣開胃得鹽則入腎亦治寒疝八角茴香又名舶茴香辛甘平功用略同麻仁見脾和陳米甘淡平養胃去濕熱除煩渴利小便米露用粳米舂極白如蒸花露法蒸取汁輕清善補凡胃氣極弱不能進粥飲者用之最宜穀芽甘溫而性不損元健脾開胃消食和中下氣化積為健脾溫中之聖藥炒用蒸餅甘平和中養脾胃消積滯活血止汗利三焦通水道陳者良建曲甘平健脾暖胃消食下氣化滯調中逐痰積破癥瘕除濕熱止瀉痢面神麯辛甘溫開胃行氣調中化水穀消積滯治痰逆目痛禹餘糧見大腸和爐甘石甘溫胃經藥燥濕止血消腫祛痰金銀之苗也金能勝木故為木疾之要藥制用甘爛水見脾和刺蝟皮苦平開胃氣治胃逆涼血肉甘平理胃氣治反胃脂滴耳聾膽點痘後風眼殭蠶見肺和攻大黃大苦大寒入脾胃肝心包大腸血分其性沉而不浮其用走而不守用以蕩滌腸胃下燥結而除瘀熱能推陳致新治一切實熱血中伏火峻利猛烈非六脈沉實者勿用病在氣分而用之為誅伐無過制熟稍緩酒浸亦能上行除邪熱王不留行見奇經攻雷丸見大腸攻甜瓜蒂苦寒胃經吐藥能吐風熱痰涎上膈宿食亦治濕熱諸病甜瓜性冷解暑而損陽凡瓜皆冷利早青尤甚麥芽見脾攻紅曲見脾攻元明粉見大腸攻芒硝見大腸攻朴硝見大腸攻穿山甲見通行攻散桔梗見肺散升麻見脾散秦艽見肝散防風見膀胱散白芷見肺散葛根辛甘平入胃兼入脾能升胃氣上行入肺而生津止渴發汗解肌散火鬱解酒毒藥毒治清氣下陷泄瀉傷寒瘧痢太陽初病勿用恐引邪入陽明也升散太過上盛下虛者慎之葛花解酒毒尤良生葛汁大寒解溫病大熱治吐衄辛夷見肺散生薑辛溫行陽分宣肺氣暢胃口散寒發表解鬱調中開痰下食能散逆氣為嘔家聖藥又能消水氣行血痹闢瘴氣薑汁辛溫而潤開痰尤良姜皮辛涼和脾行水寒知母見腎寒白茅根見脾寒白頭翁見大腸寒白蘚皮見脾寒白薇見奇經寒麥冬甘微苦微寒潤肺清心胃經正藥瀉熱生津化痰止嘔治嗽行水漏盧苦鹹寒入胃大腸通肺小腸瀉熱解毒通經下乳殺蟲療瘡茵陳見膀胱寒大青苦鹹大寒專解心胃熱毒治傷寒時疾陽毒取莖葉用鮮生地見腎寒蘆根甘寒和胃降火止嘔清上焦熱用逆水者蘆筍解魚蟹河豚毒花粉酸甘微苦微寒降火潤燥滑痰生津解渴行水治胃熱膀胱熱療瘡毒虛熱者宜之通草見肺寒薔薇根見大腸寒梔子見心寒竹茹甘微寒開胃郁清肺燥涼血除上焦煩熱兼清肝火涼胎氣筍甘微寒利膈下氣化熱爽胃消痰而能損元枇杷葉見肺寒石蓮子見心寒甘蔗甘微寒和中助脾除熱潤燥消痰能令胃氣下行利二便柿見肺寒蒲公英苦甘寒入腎陽明經瀉熱化毒專治乳癰疔毒亦為通淋妙品
