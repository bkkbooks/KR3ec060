front:
  text: 序考漢書藝文志分醫經與經方而二之而隋書經籍志則統以醫方乃讀其論則均有味乎諺所謂有疾弗治適得中醫云云蓋誠見夫醫或失宜熱以益熱寒以增寒轉傷於內與其授權於庸醫固不若聽命於造物以不治治然瞑眩瘳疾載在書醫師率屬十全為上亦著於周官安得廢醫夫亦曰審之而已神農本草漢志未登肇見之隋書嗣而唐書新舊而宋史悉録之即國朝四庫全書採醫家言至九十七種言本草者亦十餘種在神農初藥分三品共三百六十種逮雷公桐君增其族類廣其主治而書益著而醫經資之達其用而經方之名因以立所以由漢而隋史氏遂統以醫方稱也且夫醫書之存於今者亦僅矣夫針經素問古所謂黃帝內經也次若難經靈樞與夫甲乙經所採録明堂孔穴十二經脈五臟諸圖乃與針灸家所共援以察榮衛部位臟腑脈法經絡腧穴是史論醫經所謂原人血脈陰陽表裡以起百病之本死生之分慎度所施而後之人有因以暢其說者如金匱要略傷寒論及病源候及三因五運六氣等論皆醫經之遺也余則各本草乃史論經方所謂本草木之寒溫辨五苦六辛致水火之齊因氣感之宜以通蔽解結而後之人有因以善製造者如千金百一和劑局方及全生衛生奇疾等方皆經方之類也即至意見有偏門戶各立有若河間易州金華或主瀉火主滋陰莫不各先研經圖後依於本草而講修治然則經圖及本草其醫之始事歟今諸醫經既難率購而四庫所録諸本草坊間亦少刊布即所市有本草備要從新各編又絶不及經圖徒掇拾破碎未易會通而酌其宜山陰友人姚建霞茂才來省其兄清如於靖安署示豫以本草分經一編編中略採録諸經脈圖具列諸藥總目再析列通行分行不循經絡各類中各以補和攻散寒熱自為其類不務詳核而尚簡當甚便檢閲熟審之依論為方當不至益熱增寒而疾可瘳十全可幾惜板毀於兵無從復購因為正其次序復付手民公諸世增名為本草分經審治審之者誰閲此者事也編著者誰實建霞同堂曾王父諱瀾號涴云廣文先生也而名以和尚則以晚年寡發故又冠以維摩維摩詰蓋深入法門明瞭衆生能斷衆生病者想諸經圖其究之精矣乃若本草實醫之始事也是編之著不過如藥王藥上王子嘗世界草木金石悉知苦酢鹹淡甘辛等味並諸和合是冷是熱有毒無毒如楞嚴經所云爾維摩學佛服行無量功德當不僅以是編狎視之維摩有知其將亦點首乎黃梅梅雨田原例次序略經更定一編內先列內景經絡諸圖以資考鏡且使病人自覺何處為患即可知為何經之病宜用何經之藥也一十二經次序始於手太陰肺次手陽明大腸次足陽明胃次足太陰脾次手少陰心次手太陽小腸次足太陽膀胱次足少陰腎次手厥陰心包次手少陽三焦次足少陽膽終於足厥陰肝是編不依次開列者亦因便於翻閲故也一是編以經絡為綱藥品為目勢不能於一經之內匯草木蟲魚之全故總目全載藥品又於每味下注明某經字樣俾閲者按經而稽易如指掌一凡一藥而兼入數經者均於總目每味之下注明至其性味功用則止於第一經之一味內詳載其餘各經下但注見某經字樣以省卷帙一藥有不循經絡者另列雜品一門凡總目不下注某經或通行者皆雜品也凡一經匯一經之藥從其同也而其功用則各不同故又分列補和攻散寒熱六者使之亦從其同庶令閲者依類取用較為便捷一藥品多有一物數名者若分載各味之下則散而雜稽茲將同名諸品匯列一卷以便查考一藥性有畏惡反忌讀本草者不可不知然古方多有兼用者若泥於其性而不知變通轉多窒滯是當廣閲古方以求其義不必存膠柱之見也故編內不備載畏惡反忌之文一是編所載藥名及其字體概從時俗如薏苡仁作米仁惡實作牛蒡子又薑作姜石膏作石羔之類緣通儒不妨從俗而在初學則便於查閲也通行經絡補人參甘溫微苦大補肺中元氣其性主氣凡臟腑之有氣者皆能補之生陰血亦瀉虛火凡服參不投者服山楂可解一補氣一破氣也按老山真參近時絶少惟行條參其性味與人參雖同而力極薄出關東不論大小但須全糙白皮為上半糙者次之若皮色微黃雖糙難辨紅熟者多僞不可用修條力甚薄而其性橫行手臂指臂無力者服之有效參鬚與修條相同其力尤薄參蘆能湧吐痰涎虛者用之以代瓜蒂然亦能補氣未見其盡吐也高麗參氣味略似人參而性較溫初服似有力數日後便不覺矣野者不可得種者愈大愈佳東洋參野者皮白狀類西洋參而色香味無異人參性則微涼近皆種者形似人參而性溫聞種時皆用硫黃故也若以之代黨參較為輕清非可代人參也黃精甘平補氣血而潤安五臟益脾胃潤心肺填精髓助筋骨除風濕大棗甘溫補中益氣滋脾土潤心肺調營衛通九竅助十二經和百藥脾病人宜食之加入補劑與姜並行能發脾胃升騰之氣風疾痰疾俱非所宜紅棗功用相仿而力稍遜南棗不入藥生棗甘辛多食生寒熱面甘溫補虛養氣助五臟厚腸胃北産陳麥良新麥熱南産壅氣助濕熱鹿肉甘溫補中強五臟通脈益氣力羊肉甘熱屬火補虛勞益氣力開胃壯陽道能發痼疾及瘡羊胲結成羊腹中者治反胃羊角明目殺蟲生羊血治血暈解一切毒鱔魚甘大溫補五臟去風濕能走經絡淡菜甘鹹溫補五臟益陽事治虛勞消瘻氣人乳甘鹹純陰無定性潤五臟補血液清煩熱理噎膈利腸有孕之乳為忌乳最有毒人氣治下元虛冷日令童男女以時隔衣進氣臍中甚良或身體骨節痹痛令人更互呵尉久久經絡通透紫河車甘鹹溫大補氣血而補陰之功尤為極重治一切虛勞損極大有奇效且根氣所鍾必達元海病由膀胱虛者用之尤宜清水洗至淨白用鉛壺隔湯煮極爛連汁入藥或煮略熟文火焙乾用有胎毒者傷人須以銀器試之和甘草味甘通行十二經解百藥毒生用氣平補脾胃瀉心火而生肺金炙用氣溫補三焦元氣而散表寒入和劑則補益入汗劑則解肌入涼劑則瀉熱入峻劑則緩急入潤劑則養血能協和諸藥使之不爭頭湧吐消上部腫毒梢達莖中香附辛香微苦微甘通行十二經八脈氣分調一切氣能引血藥至氣分而生血解六郁利三焦消積調經乃治標之品損氣耗血連翹見心和合歡皮甘平和血補陰安五臟和心志蓋心脾調和則五臟自安矣蕪荑辛苦溫散滿火𠫵濕化食殺蟲祛五臟皮膚肢節風濕能療鱉瘕蟲痛海桐皮苦平入血分祛風去濕殺蟲能行經絡達病所治牙蟲癬疥乳香苦溫辛香善竄入心通行十二經調氣活血去風舒筋托裡護心香徹瘡孔能使毒氣外出消腫止痛生肌沒藥苦平入十二經散結氣通瘀血消腫定痛生肌竹瀝甘苦寒滑清痰降火行經絡四肢皮里膜外之痰凡痰因風熱燥火者宜之薑汁為使虛者與參同用使人參固其經竹瀝通其絡則甘寒氣味相得益彰荊瀝甘平開經絡除風熱化痰行氣血為去風化痰之妙藥用牡荊俗名黃荊燒取瀝廣皮見肺和枳椇子甘平止渴潤五臟解酒毒按葛根葛花解酒毒而發散不如枳椇菠菜甘溫而滑利五臟通血脈開胸膈下氣調中止渴潤燥根尤良薺菜甘溫利五臟益肝和中根益胃明目同葉燒灰治痢白豆甘平補五臟暖腸胃調中助十二經脈腎病宜食之豆葉利五臟下氣豆腐甘鹹寒清熱散血和脾胃消脹滿下大腸濁氣酒大熱有毒用為嚮導可以通行一身之表引藥至極高之分和血行氣逐穢暖水臟最能亂血動火致濕熱諸病醇而無灰陳者良按石灰能解酒酸造酒家多用之而有灰之酒傷人燒酒散寒破結損人尤甚靈砂甘溫養神志安魂魄通血脈調和五臟治上盛下虛痰涎壅盛吐逆冷痛殺精鬼小兒驚吐服之最效為鎮墜神丹也硫黃合水銀煉成百沸湯助陽氣行經絡半沸者飲之傷元氣作脹鵜鶘油鹹溫滑透經絡治聾痹癰腫諸病不入湯丸蜂蜜甘滑生性涼清熱熟性溫補中潤燥解毒調營衛通三焦安五臟通便祕止諸痛和百藥與甘草同功滑腸同蔥食害人食蜜飽後食鮓令人暴亡黃蠟甘淡微溫性澀止痛生肌續絶傷止瀉痢攻大戟苦辛寒專瀉臟腑水濕逐血發汗消癰通二便閉瀉火逐痰其汁青緑亦能瀉肝陰寒善走大損真氣紫色者上白者傷人須去骨用中其毒者惟菖蒲能解之甘遂苦寒瀉腎經及隧道水濕直達水氣所結之處以攻決為用治大腹腫滿痞積痰迷去水極神損真極速麵煨用商陸苦寒沉陰下行與大戟甘遂同功療水腫脹滿蠱毒惡瘡芫花苦溫療五臟水飲痰癖治瘴瘧毒性至緊虛者忌之醋煮用根療疥防己大辛苦寒入膀胱去火邪能行十二經通腠理利九竅瀉下焦血分濕熱療風行水降氣下痰性險而健惟濕熱壅遏及腳氣病凡下焦濕熱致二陰不通者用此治之有二種漢防己治水用木防己治風用鶴蝨苦平殺五臟蟲治蛔痛巴豆辛大熱大毒峻下開竅宣滯去臟腑沉寒積滯治喉痹急症生用急治炒黑緩治去油名巴豆霜大黃黃連涼水黑豆緑豆汁能解其毒蘇木甘鹹辛平入三陰血分行血去瘀因宣表裡之風枳實苦酸微寒破氣行痰消痞止喘利胸膈寬腸胃枳殼性味功用與枳實同惟實則力猛而治下其瀉痰有沖牆倒壁之功殼則力緩而治上能損胸中至高之氣為異耳角刺辛溫搜風殺蟲通竅潰癰其鋒鋭直達病所檳榔苦辛溫能墜諸藥下行攻堅破脹消食行痰下水散邪殺蟲醒酒瀉胸中至高之氣至於下極凡氣虛下陷者宜慎用輕粉辛冷燥毒劫痰涎消積殺蟲善入經絡不可輕服今人用治楊梅毒瘡能劫邪從牙齦出然毒入經絡筋骨血液耗亡多成痼疾惟土茯苓能解其留毒粉霜略同虻蟲苦寒有毒攻血遍行經絡色青入肝極能墮胎穿山甲鹹寒性猛善竄入肝胃功專行散能出入陰陽貫穿經絡入營分以破結邪直達病所通經下乳消腫潰癰止痛排膿和傷發痘為風瘧瘡科要藥蘄蛇甘鹹溫性竄內走臟腑外徹皮膚透骨搜風截驚定搐治風濕癱瘓疥癩皮骨尤毒宜去淨烏梢蛇功用與蘄蛇同無毒而力淺大者力更減散威靈仙辛鹹溫屬木宣疏五臟通行十二經行氣祛風破積治風濕痰飲諸病性極快利積疴不痊者服之有效然大走真氣耗血用宜詳慎防風見膀胱散蒼耳子甘苦溫發汗散風濕上通腦頂下行足膝外達皮膚治頭面諸疾遍身瘙癢去刺用採根煎熬名萬應膏功用略同冰片辛香善走體溫用涼先入肺傳於心脾而透骨通竅散鬱火辟邪消風化濕風病在骨髓者宜之若在血脈肌肉輒用冰麝反引風入骨莫之能出蔥白辛散平發汗解肌通上下陽氣而活血解毒白冷青熱取白用同蜜食殺人青葉治水病足腫白芥子見肺散麝香辛溫香竄開經絡通諸竅內透骨髓外徹皮毛搜風治諸風諸氣諸血果積酒積辟邪解毒殺蟲風在肌肉者誤用之反引風入骨用當門子尤勝桑蠶甘溫有毒祛風而走竄經絡其性與穿山甲相近用以發痘大傷元氣桑蟲矢功用略同寒牛旁子辛苦寒滑瀉熱散結宣肺氣清喉理嗽利二便行十二經散諸腫瘡毒腰膝滯氣根苦寒治中風貼反花瘡青黛鹹寒瀉肝散五臟鬱火解中下焦蓄蘊風熱敷癰瘡菾菜甘苦涼滑利五臟通心膈搗汁治時行壯熱止熱毒痢茭白甘冷而滑利五臟去煩熱根名菰根冷利甚於蘆根白苣苦寒利五臟通經脈開胸膈滯氣解熱毒利腸萵苣苦冷功同白苣又能通乳汁殺蟲蛇毒子下乳汁通小便絲瓜甘冷涼血解毒除風化痰通經絡行血脈消浮腫發痘瘡滑腸下乳用筋木耳甘平利五臟宣腸胃治五痔血症地耳甘寒明目石耳甘平明目益精大麥甘鹹微寒補虛除熱益氣調中實五臟化穀食大麥面平胃下氣消積涼血小粉甘涼和五臟調經絡醋熬消癰疽湯火傷緑豆甘寒行十二經清熱解毒利水和脾功在緑皮去皮即壅氣煮湯加蜜或鹽冷飲粉撲痘瘡潰爛元精石鹹寒而降治上盛下虛救陰助陽有扶危拯逆之功人中黃見胃寒金汁見胃寒熱蘄艾苦辛生溫熟熱純陽香燥能回垂絶之元陽通十二經走三陰而尤為肝脾腎之藥理氣血逐寒濕暖子宮止血溫中開鬱調經殺蛔以之灸火能透諸經而除百病附子辛甘大熱純陽其性浮多沉少其用走而不守通行十二經無所不至能引補氣藥以復失散之元陽引補血藥以滋不足之真陰引發散藥開腠理以逐在表之風寒引溫暖藥達下焦以祛在裡之寒濕治督脈為病及一切沉寒痼冷之症生用發散熟用峻補誤服禍不旋踵中其毒者黃連犀角甘草煎湯解之或用澄清黃土水亦可烏附尖吐風痰治癲癇其鋭氣直達病所側子大燥發散四肢充達皮毛治手足風濕花椒辛苦溫散寒燥濕溫中下氣利五臟去老血殺蟲乾薑辛熱燥脾濕開五臟六腑通四肢關節宣諸絡脈逐寒發表溫經定嘔消痰去滯炒黃用如與五味子同服亦能利肺氣而治寒嗽炮姜辛苦大熱除胃冷而守中兼補心氣祛臟腑沉寒錮冷去惡生新能回脈絶無陽又引血藥入肝而生血退熱引以黑附則入腎祛寒濕大蒜辛熱通五臟達諸竅消食闢穢去寒滯解暑氣殺蛇蟲毒氣味重濁多食則昏目損神搗敷治鼻衄不止關格不通亦能消水利便如切片灼艾灸癰疽良須用獨頭者佳至百補俗說不足信也手太陰肺補人參見通行補高麗參見通行補珠參苦寒微甘補氣降肺火肺熱有火者宜之土參甘微寒性苦下降補肺氣而能使清肅下行凡有升無降之症宜之洋參苦寒微甘補肺降火虛而有火者宜之北沙參甘苦微寒專補肺陰清肺火金受火刑者宜之南沙參功同而力稍遜黃精見通行補玉竹甘平補氣血而潤去風濕潤心肺用代參地不寒不燥大有殊功黃耆甘溫升浮補肺氣溫三焦壯脾胃實腠理瀉陰火解肌熱氣虛難汗者可發表疏多汗者可止生用瀉火炙用補中為內托瘡癰要藥但滯胃爾白芨苦辛平性澀入肺止吐血去瘀生新肺損者能復生之治跌打湯火傷及瘡癰白芍見肝補冬蟲夏草甘平補肺腎止血化痰治勞嗽五味子性溫五味俱備酸鹹為多斂肺補腎益氣生津澀精明目強陰退熱斂汗止嘔寧嗽定喘除渴止瀉夏月宜常服之以瀉火而益金北産者良大棗見通行補胡桃甘熱通命門利三焦潤腸胃溫肺補腎潤燥養血佐破故紙大補下焦然能動風痰助腎火皮性澀若連皮用則斂肺固腎澀精油者有毒能殺蟲殼外青皮壓油烏鬚髮落花生辛甘香潤肺補脾和平可貴白糖見脾補山藥見脾補米仁見胃補粳米甘平得天地中和之氣平和五臟補益氣血入肺清熱利便晚收者性涼尤能清熱北粳涼南粳溫新粳熱陳粳涼赤粳熱白粳涼新米動氣米泔清熱涼血利小便用第二次者糯米見脾補飴糖見脾補磁石見腎補燕窩甘淡平大養肺陰開胃氣化痰止嗽補而能清一切病之由於肺虛不能清肅下行者此皆治之燕肉不可食損人神氣鴨甘平微咸入肺腎血分補陰除蒸利水化虛痰毛白嘴烏老者良熱血解諸毒蛋甘寒咸除心膈熱白鶴血鹹平益肺去風補虛乏益氣力阿膠甘平清肺養肝補陰滋腎止血去瘀除風化痰潤燥定喘利大小腸治一切血病風病大抵補血與液為肺大腸要藥傷暑伏熱成痢者必用之胃弱脾虛者酌用化痰蛤粉炒止血蒲黃炒豬肺補肺治虛嗽羊肺通肺氣止咳嗽亦利小便羊乳見大腸補蛤蚧鹹平補肺潤腎益精助陽通淋定喘止嗽氣虛血竭者宜之其力在尾毒在眼去頭足酥炙用和甘草見通行和鬱金辛苦微甘輕揚上行入心包心肺涼心熱散肝鬱破血下氣治經水逆行氣血諸痛耗真陰廣木香見三焦和白豆蔻辛熱肺經本藥流行三焦溫暖脾胃散滯氣消酒積除寒燥濕化食寬膨藿香見脾和甘菊花見肝和延胡索見肝和旋覆花辛苦鹹微溫入肺大腸下氣行水軟堅消痰痞通血脈除噫氣絹包煎根治風濕葉治瘡毒止血砂仁見脾和紫菀辛苦溫性滑潤肺下氣化痰止渴專治血痰及肺經虛熱又能通利小腸白者名女菀紫入血分白入氣分款冬花辛溫潤肺消痰理嗽能使肺邪從腎順流而出治逆氣咳血主用皆辛溫開豁卻不助火白蒺藜見肝和佛耳草微酸大溫肺氣止寒嗽消痰治寒熱泄瀉百部甘苦微溫能利肺氣而潤肺溫肺治寒嗽殺蟲蝨傷胃滑腸白米飯草甘平潤燥補肺和中益胃治吐血咳嗽熬膏用罌粟殼酸澀平斂肺澀腸固腎宜治骨病酸收太緊易兜積滯御米甘寒潤燥治反胃鴉片酸澀溫止瀉痢澀精氣松花甘溫潤心肺益氣止血除風善滲諸痘瘡傷損濕爛不痂松子甘溫而香潤肺燥開胃散水氣除諸風治大便虛祕白檀香辛溫利氣調脾肺利胸膈兼引胃氣上升烏藥辛溫香竄上入脾肺下通膀胱腎能疏胸腹邪逆之氣凡病之屬氣者皆可治順氣則風散理氣則血調故又治風療瘡及貓犬百病訶子苦溫酸澀泄氣消痰斂肺澀腸生用清金行氣熟用溫胃固腸茯苓見脾和琥珀見肝和杏仁辛苦甘溫瀉肺降氣行痰解肌除風散寒潤燥並解肺郁利胸膈氣逆通大腸氣祕治上焦風燥又能殺蟲消狗肉麵粉積去皮尖研用如發散連皮尖研雙仁者殺人叭噠杏仁甘平性潤止咳下氣消心腹逆悶甜杏仁不入藥杏子酸熱有小毒損人烏梅酸澀而溫入脾肺血分澀腸斂肺止血生津止渴安蛔湧痰解毒白梅酸澀鹹平功用略同兼治痰厥喉痹牙關緊閉敷癰毒刀箭傷多食則齒齼嚼胡桃肉即解木瓜見肝和廣皮辛苦溫入脾肺氣分能散能和能燥能瀉利氣調中消痰快膈宣通五臟統治百病入和中藥留白入疏通藥去白亦名橘紅兼能除寒發表廣産為勝名廣皮陳者良名陳皮化州陳皮消伐太峻不宜輕用橘肉生痰聚飲佛手