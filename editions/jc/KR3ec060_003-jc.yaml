散寒黃連大苦大寒入心瀉火鎮肝涼血燥濕開鬱能消心竅惡血亦瀉脾火酒炒治上焦火薑汁炒治中焦火鹽水炒治下焦火胡連性味功用並似黃連治小兒潮熱五疳解吃煙毒川貝母見肺寒黃芩苦寒入心勝熱折火之本瀉中焦實火除脾家濕熱為中上二焦之藥亦治邪在少陽往來寒熱中空者名枯芩佐梔子瀉肺火中實者名條芩瀉大腸火白茅根見脾寒丹皮見肝寒麥冬見胃寒瞿麥見小腸寒燈心甘淡微寒降心火利小腸清肺熱通氣止血利水大青見胃寒鮮生地見腎寒射干見肺寒山豆根大苦大寒瀉心火以保肺金去肺大腸之風熱消腫止痛治喉齒瘡痔諸疾解藥毒療人馬急黃梔子苦寒入心瀉心肺之邪熱使之下行由小便出解三焦鬱火最清胃脘之血內熱用仁表熱用皮蘆薈見肝寒竹葉辛淡甘寒專涼心經亦清脾氣清痰止渴除上焦煩熱天竹黃甘微寒涼心去風熱利竅豁痰鎮肝功同竹瀝而性和緩治中風驚癇南海大竹內黃粉也石蓮子苦寒清心開胃去濕熱梨見肺寒黃丹鹹寒沉陰內用鎮心安魂墜痰消積殺蟲外用解熱拔毒去瘀長肉鉛粉主治略同硃砂甘涼體陽性陰心經血分藥鎮心而瀉邪熱定驚清肝祛風解毒治癲狂下死胎多服令人呆悶細研水飛如火煉則有毒服餌常殺人或用原塊辰砂綿裹入藥同煎最妙犀角見胃寒牛黃見肝寒羚羊角見肝寒豬膽汁苦寒入心勝熱潤燥瀉肝膽之火兼能明目療疳醋和灌穀道治大便不通象牙甘涼清心腎之火療驚悸骨蒸痰熱瘡毒銼屑煎服熊膽苦寒涼心平肝明目殺蟲治驚癇塗痔繰絲湯抑心火治消渴真珠甘鹹寒入心肝二經鎮心安魂瀉熱墜痰拔毒生肌熱桂心見脾熱炮姜見通行熱足少陰腎補巴戟天甘辛微溫入腎經血分強陰益精散風濕去心用金毛狗脊見肝補肉蓯蓉甘酸鹹溫入腎經血分補命門相火潤五臟益精血滑腸功用與瑣陽相仿草蓯蓉力稍劣冬蟲夏草見肺補熟地甘微溫入足三陰經滋腎補肝封填骨髓亦補脾陰利血脈益真陰除痰退熱止瀉治一切肝腎陰虧虛損百病為壯水之主藥兼散劑亦能發汗兼溫劑又能回陽按制熟地宜九蒸九曬蓋多蒸則不滯多曬則氣溫水裡陽生之義也若一蒸便用絕不見日則與煎劑用生地何異生地苦甘寒沉陰下降入心腎肝心包小腸養陰退陽涼血生血治血虛內熱能交心腎而益肝膽兼能行水佐歸身解火鬱續斷見肝補枸杞子見肝補沙苑蒺藜苦溫補腎強陰固精明目何首烏見肝補菟絲子甘辛溫入肝脾腎強陰益精溫而不燥補衛氣助筋脈祛風進食治精寒餘瀝腎經多火者勿用五味子見肺補覆盆子見肝補桑葚甘酸溫入腎補水生津利水烏須萸肉酸澀微溫固精秘氣補腎溫肝強陰助陽而通九竅兼能發汗去核用杜仲見肝補芡實見脾補蓮子見心補慄鹹溫厚腸胃補腎氣能解羊膻甘薯見脾補韭菜辛溫微酸溫脾益胃助腎補陽固精氣暖腰膝散瘀血停痰入血分而行氣解毒韭汁胃脘上口有積血妨礙飲食者此能除之每用少許頻服久服甚效韭子辛甘溫補肝腎助命門暖腰膝胡麻見肝補黑豆甘寒補腎鎮心明目利水除熱去風活血解毒利大便馬料豆尤補腎料豆皮能止盜汗豇豆甘鹹平補腎益氣理中健胃和五臟調營衛生精髓解鼠莽毒豆為腎谷宜此當之刀豆甘溫下氣益腎歸元溫中利腸胃止呃逆磁石辛鹹沖和能引肺氣入腎補腎除熱去怯通耳明目制用漬酒良烏骨雞見肝補註鴨見肺補雀甘溫壯陽益精髓縮小便雀卵酸溫益精血治男子陰痿女人血枯禽石燕甘溫壯陽益氣補精髓縮小便浸酒服佳鹿角鹹溫熬膠煉霜功專滋補益腎強骨生精血能通督脈生用散熱行血辟邪能逐陰中邪氣惡血治夢與鬼交麋角功用相仿而溫性差減鹿筋治勞損續絕鹿䘒鹿精也大補虛勞牛髓補中填骨髓煉用羊乳見大腸補羊腰子益精助陽脛骨入腎而補骨燒灰擦牙良豬肉鹹寒療腎氣虛竭潤腸胃生精液陽事弱者不宜食能生濕痰招風熱皮有毒頭肉尤甚腦治頭風損陽道蹄通乳汁懸蹄甲治痰喘瘡痔尾血治痘瘡倒黶腰子鹹冷而通腎治腰痛耳聾狗肉見脾補海狗腎咸熱固精壯陽治陰痿精寒桑螵蛸甘鹹平入肝腎命門益精氣固腎治虛損遺濁陰痿通淋縮小便用桑樹上者若生非桑樹以桑皮佐之魚鰾暖精種子海馬甘溫暖水臟壯陽道治氣血痛消瘕塊海參甘溫補腎益精壯陽療痿龜板鹹寒至陰通心入腎補陰清熱治一切陰虛血弱之症能通任脈自死敗龜良熬膠更勝龜尿走竅透骨染鬚髮治啞聾蛤蚧見肺補吐鐵見肝補秋石鹹平滋腎水潤三焦退骨蒸軟堅為滋陰降火之藥煎煉失宜反生燥渴之患和遠志見心和砂仁見脾和牛膝苦酸平入肝腎能引諸藥下行散惡血療心腹痛治淋墮胎出竹木刺酒浸蒸則甘酸而溫益肝腎強筋骨甘菊花見肝和猴姜苦溫堅腎行血治折傷骨痿擦牙良柏子仁見心和金櫻子酸澀平固精秘氣治精滑固腸性澀而不利於氣熬膏則甘全失澀味矣烏藥見肺和五加皮見肝和石楠葉辛苦平散風堅腎利筋骨皮毛為祛風通利之藥豬苓見膀胱和橘核治疝痛腰腎冷痛蓮鬚甘平而澀清心通腎益血固精小茴香見胃和罌粟殼見肺和鉛甘寒屬腎墜痰解毒安神明目殺蟲而傷心胃青鹽甘鹹寒入肝腎助水臟平血熱散肝經風熱功同食鹽而更勝食鹽甘鹹辛寒補心入腎泄肺潤下走血勝熱潤燥軟堅通大小便堅筋骨湧吐醒酒解毒殺蟲多食傷肺損津血動腎氣闢精關九香蟲見脾和桑寄生苦甘堅腎和血舒筋絡散風濕烏賊骨見肝和龍骨見心和發見肝和攻甘遂見通行攻散獨活辛苦微溫氣緩入腎經氣分善搜伏風兼能去濕治頭痛目眩齒痛痙痹疝瘕諸症羌活見膀胱散細辛辛溫性烈腎經本藥心經引經藥散風寒浮熱溫經發汗能行水氣以潤腎燥專治少陰經頭痛北產者良寒元參苦鹹微寒純陰入腎瀉無根浮游之火凡相火上炎之症用此壯水以制之苦參大苦大寒沉陰主腎燥濕勝熱養肝膽利九竅祛風逐水解毒殺蟲龍膽草見肝寒知母辛苦寒滑入肺腎二經氣分瀉膀胱邪熱下焦有餘之火使相火不炎肺金清肅兼瀉胃熱潤燥滋陰利二便滑腸傷胃丹皮見肝寒萹蓄苦平利小便去濕熱通淋殺蟲鮮生地苦微甘大寒入心腎瀉小腸丙火亦清胃大腸火平諸血逆治熱毒痢疾腸胃如焚瘟疫痘症諸大熱天冬見肺寒旱蓮草甘酸寒補腎固齒涼血止血澤瀉見膀胱寒黃柏見膀胱寒女貞子見肝寒地骨皮見肺寒老鼠刺見肝寒蒲公英見胃寒敗醬見心包寒豬膚古注性寒味甘治咽痛豬水畜也其氣先入腎解少陰客熱膚者肌膚之義宜用燖豬皮上黑膚也按儀禮注云膚豕肉也惟燖者有膚燖字本作火龷早訓為火熱又云火熟物也拠此則明是取豬肉火炙而用其皮上燒焦之膚皮矣乃有用生豬皮者大謬象牙見心寒牡蠣見肝寒蛤粉見肝寒熱蘄艾見通行熱丁香見胃熱沒石子苦溫入腎澀精固氣強陰助陽烏鬚髮原蠶蛾氣熱固精強陽用雄者命門補淫羊藿辛香甘溫入肝腎補命門益精氣堅筋骨治絕陽不興絕陰不產瑣陽甘溫補陰益精興陽潤燥滑腸肉蓯蓉見腎補益智仁見脾補蛇床子見三焦補仙茅辛熱助命火益陽道明耳目補虛勞暖筋骨治失溺心腹冷氣精寒者宜之制用胡桃見肺補韭子見腎補陽起石鹹溫補命門治陰痿精乏子宮虛冷真者難得鹿茸甘鹹溫補右腎精氣暖腎助陽添精補髓健骨治一切虛損酥炙用麋茸功用相仿溫性差減桑螵蛸見腎補和沉香辛苦溫入右腎命門暖精助陽溫中平肝下氣而墜痰涎降而能升故又理氣調中陰虛者勿用磨汁服攻牽牛子見肺攻熱破故紙辛苦大溫入心包命門補相火以通君火暖丹田壯元陽能納氣歸腎附子見通行熱天雄附子細長者為天雄大燥回陽補下焦腎命陽虛逐風寒濕為風家主藥發汗久止陰汗胡盧巴苦溫純陽入命門暖丹田壯元陽治腎臟虛冷除寒濕肉桂見肝熱川椒見肺熱大茴香辛溫暖丹田補命門開胃下食調中止嘔治寒疝石硫黃見大腸熱奇經八脈補當歸見肝補白芍見肝補鹿角見腎補牛髓見腎補豬脊髓補虛勞益骨髓治脊痛除蒸龜板見腎補和川芎見膽和澤蘭見脾和廣木香見三焦和香附見通行和紫石英甘辛溫重鎮怯潤去枯治心神不安肝血不足走衝任二經暖子宮療女子血海虛寒不孕火煅醋淬研末水飛攻王不留行甘苦平陽明衝任血分之藥其性行而不住通血脈除風利便治金瘡癰疽出竹木刺桃仁見肝攻散升麻見脾散柴胡見膽散羌活見膀胱散藁本見膀胱散寒白薇苦鹹寒陽明衝任之藥利陰氣清血熱調經熱附子見通行熱吳茱萸見肝熱不循經絡雜品補旋葍即旋花甘辛溫補勞損益精氣主續筋凡筋斷者取旋葍根搗汁瀝入仍以渣敷之日三易須令斷筋相對半月後即相續如故蜀見奴逃走多刺筋以此續之百不失一南燭苦酸澀平補陰止泄除睡子酸甘平補陰固精榛子甘平調中益氣開胃實腸南瓜甘溫補中益氣同羊肉食則壅氣黍甘溫益氣補中多食作煩熱稷甘平益氣和中粱甘益氣和中除煩利便黃粱平白粱青粱微涼小米鹹淡微寒補虛損益丹田開脾胃利小便秫甘微寒益陰治肺瘧及食鵝鴨成症陰虛不眠穇子甘澀補中益氣厚腸胃高粱甘溫而澀溫中澀腸胃黏者與粟米同功玉蜀黍甘平調中開胃菰米甘冷解熱調腸胃救荒東牆子甘平益氣堅筋骨蓬草子酸澀平作飯無異粳米有黃蓬青科飛蓬三種𦬣草米甘寒去熱利腸胃益氣力蒒草子甘平補虛溫腸胃止嘔逆稗辛甘苦微寒益氣宜脾粥糯米秫米黍米甘溫益氣治脾胃虛寒粳米秈米粟米粱米甘平益氣養脾胃利小便止煩渴按粥飲之化痰甚易晨食行陽不致成痰晚食行陰即易成痰也蠶豆甘澀溫補中益氣澀精實腸雉雞酸甘微寒補中益氣止泄痢治蟻瘻油鴨甘平補中益氣斑鳩甘平益氣明目治噎牛皮膠甘平補陰潤燥治血症癰疽通大便虛熱人宜之驢肉甘涼補益氣血治勞損驢溺羊寒殺蟲治反胃噎膈須熱飲田雞甘寒解熱毒利水消腫補虛損產婦尤宜鰱魚甘溫溫中益氣發瘡勒魚甘平開胃暖中作鯗尤良石首魚甘平開胃益氣白鯗消宿食理腸胃治下痢腹脹炙食能消瓜成水鰣魚甘平補虛勞鯧魚甘平益氣力鯽魚甘溫諸魚屬火獨鯽魚屬土和胃實腸行水鯿魚甘溫調胃助脾利五臟和芥食能助肺氣去胃風鯔魚甘平開胃利五臟與百藥無忌草魚甘溫暖胃和中發瘡青魚甘平益氣力治腳氣腳弱膽苦寒瀉熱治目疾喉痹療魚骨哽鯉魚甘平下水氣利小便膽苦寒明目骨療魚骨哽烏魚甘寒祛風下水利腸膽苦甘治喉痹銀魚甘平寬中健胃泥鰍甘平暖中益氣醒酒收痔鰻甘平補虛損去風殺蟲治骨蒸勞瘵海鰻同蝦甘溫托痘瘡壯陽道吐風痰動風熱海蝦甘鹹平祛風殺蟲蟶甘鹹平補虛去煩熱主冷痢江珧桂甘鹹微溫下氣調中利五臟消宿食西施舌甘鹹平益精潤臟腑和三柰辛溫暖中辟惡治寒濕蟲牙路路通形似楊梅而較大刺長尖銳入火熏之幽香清烈顧名思義宜為表散藥中之嚮導也古書不載近多用之落得打甘平行血止血治跌打金瘡用根奶酣草辛溫芳香和中辟惡木棉甘溫治血崩金瘡或棉或布燒灰用花油即術棉子油辛熱微毒治瘡疥損目銀花甘平除熱解毒養血療風治血痢瘡毒寬膨性極中和多用乃效藤葉名忍冬性同管仲苦微寒解邪熱之毒去瘀軟堅殺蟲浸水缸中日飲其水能解時疫玉簪辛甘寒解一切毒下骨哽損齒極速茵芋辛苦微溫治風濕拘攣痹痛炙用莽草辛苦溫去風濕治頭風癰腫制用
