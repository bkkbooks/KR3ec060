front:
  text: 石羔甘辛淡降體重氣輕胃經大寒之藥兼入肺三焦氣分清熱降火發汗解肌緩脾止渴發斑疹亦止中暑自汗先煎犀角苦酸鹹寒清胃中大熱涼心瀉肝祛風利痰解毒療血治驚狂斑疹諸症能消胎氣角尖尤勝磨汁用蟾蜍辛涼微毒入胃退虛熱行濕氣治蟲䘌癰疽療疳蟾酥辛溫有毒治疔毒諸疳能爛人肌肉人中黃甘寒入胃大解五臟實熱清痰火消食積甘草經糞浸者或用皂莢金汁與人中黃同而更勝熱肉果見脾熱蓽茇辛熱除胃冷祛痰散陽明浮熱亦入大腸經治瀉痢散氣動火良薑辛熱暖胃散寒下氣止痛子溫肺醒脾能散寒燥濕白附子辛甘大熱純陽陽明經藥能引藥勢上行治面上百病祛風痰痹濕此藥無復真者丁香辛溫純陽而燥泄肺溫胃大能療腎壯陽事治胃冷嘔逆症非虛寒勿用炮姜見通行熱大茴香見命門熱鍾乳甘溫胃經氣分藥補陽利竅其氣剽悍能令陽氣暴充惟命門火衰者可暫用之手少陽三焦補炙甘草見通行和注黃耆見肺補蛇床子辛苦溫強陽補腎散寒祛風燥濕殺蟲治男婦前陰諸疾及子臟虛寒瘡癬風濕之病為腎命三焦氣分之藥胡桃見肺補扁豆見胃補秋石見腎補和廣木香辛苦溫三焦氣分之藥能升降諸氣泄肺氣疏肝氣和脾氣治衝脈為病及一切氣病心疼香燥恐動火邪香附見通行和白豆蔻見肺和藿香見脾和連翹見心和萆薢見胃和杏仁見肺和枇杷甘酸平止渴利肺氣治上焦熱多食發痰熱傷脾藕生用甘寒涼血散瘀治上焦痰熱煮熟甘平補益藕節澀平止血消瘀解熱毒薤白見大腸和蒸餅見胃和百藥煎見肺和注攻牽牛子見肺攻防己見通行攻蜀黍即常山莖葉常山辛苦寒性猛烈引吐行水祛痰飲截瘧蜀黍功用與常山同而性輕揚能散上焦之邪結青皮見肝攻芒硝見大腸攻朴硝見大腸攻蓬砂甘鹹涼除上焦胸膈痰熱柔五金去垢膩治喉痹口齒諸病散防風見膀胱散寒地榆苦酸微寒性澀入下焦除血熱而止血炒黑用梢行血黃連見心寒胡連見心寒黃芩見心寒知母見腎寒龍膽草見肝寒青黛見通行寒蘆根見胃寒栝蔞甘苦寒潤肺清上焦之火使熱痰下降又能盪滌胸中鬱熱垢膩理嗽治痢止渴止血滑腸近多用仁名婁仁雖取油潤嫌濁膩爾木通見小腸寒梔子見心寒竹茹見胃寒竹葉見心寒天精草苦甘涼清上焦心肺之客熱石花菜甘鹹大寒而滑去上焦浮熱發下部虛寒石羔見胃寒滑石見膀胱寒浮石見肺寒足少陽膽補棗仁甘潤生用酸平專補肝膽炒熟酸溫而香亦能醒脾斂汗寧心療膽虛不眠肝膽有邪熱者勿用和川芎辛溫升浮入心包肝為膽之引經乃血中氣藥升陽開鬱潤肝燥補肝虛上行頭目下行血海和血行氣搜風散瘀調經療瘡治一切風木為病青蒿見肝和連翹見心和半夏見胃和郁李仁辛苦甘平性降下氣行水補血潤燥得酒則入膽去皮尖治標之品津液不足者慎用膽礬酸澀辛寒入膽經性斂而能上行吐風熱痰涎斂咳逆而散風木相火殺蟲攻青皮見肝攻散秦艽見肝散前胡見肝散柴胡苦微寒膽經表藥能升陽氣下陷引清氣上行而平少陽厥陰之邪熱宣暢氣血鮮郁調經能發表最能和里亦治熱入血室散十二經瘡疽病在太陽者服之則引賊入門病入陰經者服之則重虛其表用宜詳慎銀柴胡專治骨蒸勞熱小兒五疳寒苦參見腎寒黃芩見心寒龍膽草見肝寒槐實見大腸寒桑葉苦甘而涼滋燥涼血止血去風清泄少陽之氣熱豬膽汁見心寒手厥陰心包補丹參見心補生地見腎補和川芎見膽和鬱金見肺和延胡索見肝和連翹見心和益母草辛微苦微寒入心包肝消水行血去瘀生新解毒利二便辛散滑利並不補益茺蔚子活血調經明目行中有補血滯血熱者宜之蒲黃甘平入心包肝經血分生用性滑行血消瘀祛心腹膀胱之熱療瘡腫炒黑性澀止血攻大黃見胃攻茜草酸鹹溫入心包肝行血通滯無瘀者慎用紫葴花甘酸寒入心包肝破血去瘀能去血中伏火治血熱生風之症寒紫草見肝寒丹皮見肝寒木通見小腸寒川楝子見肝寒敗醬即苦菜苦鹹微寒入心包腎主暴熱火瘡疥痔除癰腫結熱風痹為治腸癰之上藥代赭石見肝寒熱破故紙見命門熱足厥陰肝補當歸辛甘苦溫入心肝脾治衝脈帶脈為病為血中氣藥血滯能通血虛能補血枯能潤血亂能撫使氣血各有所歸散內寒補不足去瘀生新潤燥滑腸治上用頭治中用身治下用尾統治全用辛氣太甚如熬膏則去其辛散之氣專取潤補之力虛弱畏辛氣者用之大妙歸鬚力薄其氣不升且能宣絡不似歸身之辛溫上升也白芍苦酸微寒入肝脾血分為肺之行經藥瀉肝火和血脈收陰氣斂逆氣緩中退熱其收降之性又能入血海治一切血病脾熱易飢赤芍瀉肝火散惡血利小腸白補而斂赤散而瀉白益脾能於土中瀉木赤散邪能行血中之滯金毛狗脊苦甘溫堅腎滋肝益血養氣能除風寒濕淫羊藿見命門補熟地見腎補生地見腎補枸杞子甘微溫滋補肝腎而潤生精助陽去風明目利大小腸續斷苦辛微溫補肝腎通血脈理筋骨暖子宮縮小便止遺泄破瘀血治金瘡折跌補而不滯行而不泄何首烏苦甘溫補益肝腎澀精氣養血化虛痰烏鬚髮消癰腫療瘧痢補陰而不滯不寒強陽而不燥不熱為調和氣血之聖藥久服延年制用菟絲子見腎補覆盆子甘酸溫而性固澀補益肝腎固精明目起陽痿縮小便強腎無燥熱之偏固精無凝滯之害葉絞汁治目弦蟲除膚赤棗仁見膽補杜仲甘溫微辛入肝經氣分潤肝燥補肝虛又兼補腎能使筋骨相著補腰膝萸肉見腎補白糖見脾補韭子見腎補冬瓜子見脾寒注胡麻甘平補肝腎填精髓潤五臟涼血益血療風解毒滑腸按胡麻有四稜六稜七八稜之別因地土肥瘠而然八稜者名巨勝子舊說胡麻即脂麻脂俗作芝而近時名家方論胡麻與黑芝麻往往並用則明是二物矣芝麻功用略同皮肉俱黑徽州產者良麻油涼血生肌滑胎療瘡亞麻即壁蝨胡麻甘微溫氣惡不堪食治大風瘡癬雞甘溫屬木補虛溫中動風煮汁性滑而濡烏骨雞甘平屬水能益肝腎退熱補虛治肝腎血分之病雄雞冠血治中惡驚忤塗口眼歪斜用老者雞蛋甘平補益氣血散熱止嗽痢哺雞蛋殼敷瘡毒蛋內白皮治久咳結氣雞屎白微寒下氣消積通利大小便治蠱脹米症牛筋補肝強筋益氣力續絕傷羊肝青色者補肝明目膽苦寒點目良阿膠見肺補桑螵蛸見腎補鱉甲鹹寒屬陰入肝補陰除熱散結軟堅治肝經血分之病為瘧家要藥鱉肉涼血補陰治瘧痢忌莧菜勿同食吐鐵甘酸鹹寒補肝腎益精髓和三七見胃和川芎見膽和澤蘭見脾和鬱金見肺和廣木香見三焦和延胡索辛苦溫入肺脾心包肝能行血中氣滯氣中血滯活血利氣治諸痛生用破血酒炒調血青蒿苦寒芬芳入肝膽血分除骨髓蒸熱陰分伏熱清暑解穢明目治鬼疰用子玫瑰花氣味甘平香而不散肝病用之多效蒸露尤佳牛膝見腎和甘菊花甘苦微寒能益肺腎以制心火而平肝木祛風除熱明目散濕痹花小味苦者名苦薏非真菊也益母草見心包和萆薢見胃和菝葜見胃和鉤藤甘微苦微寒除心熱主肝風相火之病風靜火息則驚癇眩暈斑疹諸症自平祛風而不燥中和之品久煎則無力蒲黃見心包和白蒺藜辛苦溫散肝風而瀉肺氣勝濕涼血破血炒熟去刺亦能補陰夏枯草辛苦微寒散肝經之鬱火解內熱散結氣消癭治目珠夜痛久服傷胃木蝴蝶治肝氣諸書不載近多用之蓋取木喜疏散蝴蝶善動之意爾柏子仁見心和沉香見命門和五加皮辛苦溫順氣化痰堅腎益精養肝祛風勝濕逐皮膚瘀血療筋骨拘攣有火者勿服血竭見心和琥珀甘平入心肝血分又能上行使肺氣下降而通膀胱從鎮墜藥則安心神從辛溫藥則破血生肌從淡滲藥則利竅行水亦治目疾橘葉行肝氣治癰散毒絞汁飲木瓜酸澀而溫和脾理胃斂肺伐肝化食止渴調營衛利筋骨去濕熱消水脹氣脫能收氣滯能和酸收太甚多食病癃閉薺菜見通行和金見心和銀見心和鐵辛平鎮心平肝定驚療狂解毒鐵屑鐵精鐵繡鐵華大抵皆借金氣以平木墜下無他義也針砂消水腫散癭瘤銅綠酸平吐風痰去風熱止金瘡血殺蟲療疳損血色青入肝專主東方之病紫石英見奇經和青鹽見腎和絳礬入血分能伐肝木而燥脾濕五靈脂甘溫純陰氣味臊惡入肝經血分通利血脈生用散血炒用止血除風殺蟲化痰消積治氣血諸痛一切血病北地有鳥名號寒蟲此其屎也酒飛去砂石用豬肝入肝諸血藥中用之以為嚮導則可若作膳常食有損無益殭蠶見肺和烏賊骨鹹溫入肝腎血分通血脈祛寒濕治血枯澀瀉痢墨魚肉酸平益氣通經龍骨見心和龍齒澀平屬木主肝鎮心安魂治驚癇癲疾發苦平入肝腎兼能去心竅之血補陰涼血消瘀治諸血病及驚癇皂角水洗煅胎髮尤良能補衰涸攻莪朮辛苦溫主一切氣能通肝經聚血破血行氣攻積通經三稜苦平力峻入肝經血分破血中之氣散一切血瘀氣結消堅積薑黃見脾攻紅花辛甘苦溫入肝經破瘀活血潤燥消腫過用能使血行不止胭脂活血解痘毒絳緯略得紅花之力可以養血而又借蠶絲以行經絡虛而血滯者用之最宜南星辛苦溫燥入肝脾肺治風散血勝濕除風痰性緊毒而不守能攻積拔腫墮胎得防風則不麻制用膽星用黃牛膽汁和南星末入膽中風乾功用同大戟見通行攻大黃見胃攻茜草見心包攻紫葳花見心包攻皂角見肺攻桃仁苦平微甘緩肝氣泄血滯通大腸血秘治血燥經閉熱入血室無瘀慎用泡去皮尖炒研桃花苦平專於攻決下水除痰消積聚利二便療瘋狂千葉者勿用桃葉苦平殺蟲發汗桃子辛酸甘熱微毒多食有熱生癰癤有損無益桃梟苦微溫辟邪青皮辛苦溫沉降氣烈入肝膽氣分疏肝瀉肺破積消痰最能發汗引諸藥至厥陰之分兼入脾下飲食雄黃辛溫獨入厥陰氣分搜肝氣散肝風能化血為水燥濕殺蟲解百毒雌黃功用略同薰黃最劣不堪用礞石甘鹹重墜入肝能平肝下氣為治頑痰結癖之神藥制用花芷石酸澀平專入肝經血分能化瘀血為水下死胎止金瘡出血夜明砂辛寒肝經血分藥活血攻血消積明目虻蟲見通行攻蜈蚣辛溫有毒入肝善走能散去風殺蟲治臍風驚癇蛇症蠍甘辛有毒屬木去風治諸風眩掉一切厥陰風木之病去足焙用蠍梢蠍之尾也功用相同其力尤緊穿山甲見通行攻散天麻辛溫入肝經氣分通血脈疏痰氣治諸風掉眩煨用秦艽苦辛祛濕散風活血去腸胃濕熱疏肝膽滯氣治一切濕勝風淫之症前胡辛甘苦寒暢肺理脾解膀胱肝經熱邪性陰而降功專下氣氣下則火降而痰消能除實熱專治肝膽經風痰柴胡見膽散羌活見膀胱散防風見膀胱散荊芥辛苦溫芳香升浮入肝經氣分兼行血分發汗散風濕通利血脈助脾消食能散血中之風清熱散瘀破結解毒為風病血病瘡家要藥風在皮裡膜外者宜之穗善升發炒黑治血薄荷見肺散寒苦參見腎寒黃連見心寒胡連見心寒龍膽草大苦大寒沉陰下行入肝膽而瀉火兼入膀胱腎經除下焦濕熱酒浸亦能外行上行紫草甘鹹寒性滑入肝心包血分涼血活血通二便或用茸取其初得陽氣以發痘瘡丹皮辛苦微寒入心腎心包肝善瀉相火功勝黃柏和血涼血而生血去瘀除熱退無汗之骨蒸青黛見通行寒射干見肺寒車前子見膀胱寒槐實見大腸寒女貞子甘苦涼益肝腎除火純陰至靜必陰虛有火者方可用按女貞冬青古作二種實一物也蘆薈大苦大寒涼肝鎮心功專清熱殺蟲治驚癇濕癬波斯國木脂也密蒙花甘而微寒潤肝燥專治目疾秦皮苦寒性澀除肝熱治風濕諸痹止痢解天蛇毒蕤仁甘微寒