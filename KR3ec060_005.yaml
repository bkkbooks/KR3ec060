front:
  text: 豨蘞草苦辛生用寒熟用溫長於去風濕治麻痹而能燥血並不補益酒拌蒸曬九次天仙藤苦溫疏氣活血治妊娠水腫土連翹苦溫治風寒濕痹撲損疼痛月月紅甘溫活血消腫地錦辛平通流血脈散血止血煙辛溫行氣闢寒治山嵐瘴霧其氣入口不循常度頃刻而周一身令人通快然火氣熏灼耗血損年煙筒中水解蛇毒松香苦甘溫燥祛風去濕化毒生肌入蔥管內煮白用松毛苦溫治風濕諸瘡生毛髮松節苦溫燥治骨節間風濕能燥血中之濕紫檀香鹹平入血分和血止血消腫毒降香辛溫辟惡止血療金刃傷楓香脂辛平調氣血解毒功與乳香相近蘇合油甘溫走竄通竅開鬱闢一切不正之氣殺精鬼樟腦辛熱香竄能於水中發火通竅除濕殺蟲桑枝苦平祛風利水治手足風寒濕痹桑根治小兒驚癇及敷鵝口瘡大效取東南行者研汁用楮實甘寒而利消水軟堅療骨哽皮甘平行水葉甘涼祛濕熱治痢水楊苦平行氣血取枝葉煎洗治痘瘡漿滯不起西河柳甘鹹平消疒不療風解毒亦散痧疹熱毒臭橘葉辛溫解毒治下痢喉瘻荔枝核甘澀溫散滯氣闢寒濕治胃脘痛形肖睪丸故亦治㿗疝卵腫煅用荔枝甘酸熱止厄逆多食發熱齦腫衄血殼發痘瘡石榴皮酸澀而溫澀腸止泄痢崩帶脫肛殺蟲烏須能戀膈成痰積未盡者勿服石榴治瀉痢多食損肺壞齒榴花千葉者治心熱吐血衄血香團苦甘酸辛下氣消食快膈化痰能去濁惡之氣治飲酒人口氣孕婦口淡不思食花紅酸澀甘溫生津治泄精水痢多食發熱閉百脈楊梅酸甘溫去痰止嘔消食生津和利五臟能滌腸胃除惡氣燒灰服斷下痢甚驗多食發熱衄血萱草甘微涼去濕熱通小便利胸膈明目根利水氣治淋濁吐衄慈姑苦甘微寒行血能下石淋治百毒胡荽辛溫香竄闢一切不正之氣發痘瘡療沙疹止頭痛通小腹氣及心竅消穀利腸胡荽菜久食損精神令人多忘發腋臭蘿蔔辛甘平生食升氣熟食降氣化痰消食散瘀制面毒豆腐毒菜辛苦溫功用略同胡蘿蔔甘平寬中下氣散滯紫菜甘鹹寒軟堅消癭瘤積塊治熱氣煩塞咽喉蓬蒿菜甘辛涼和中消痰利腸胃薺菜子甘平去風熱明目花治久痢闢蚊蛾白菜甘平利腸胃除煩消食下氣和中黃芽菜尤益人油菜辛溫散血消遊風丹腫子功用略同治産難油能殺蟲黃花菜甘微苦微寒通結氣利腸胃龍鬚菜甘寒微咸清熱消癭利小便葫蘆甘平而滑利水消腫脹茄子甘寒而利散血寬腸動風發病能傷女人子宮茄根散血消腫香芋甘辛寒熟食厚腸胃止熱嗽研水生服解藥毒芋艿辛平滑寬胃口通腸閉炊單布菜名也治墜馬及一切筋骨損或謂是久用炊布者非香菌甘平破血治風松菌治溲濁不禁土菌甘寒燒敷瘡疥蘑茹甘寒理氣化痰益腸胃黃豆甘溫寬中下氣利大腸消水腫痘癰豆油辛甘熱塗瘡疥豌豆甘平屬土治吐逆泄痢腹脹黎豆甘微苦溫益氣溫中蕎麥甘寒降氣利腸治腸胃沉積野麥甘平滑腸可救荒穬麥甘微寒補中除熱米醋酸苦溫散瘀除症斂氣血消癰腫而損胃自然銅辛平主折傷續筋骨散瘀火煅醋淬甘草水飛古文錢辛平治目中障瘀橫産五淋亦可煮汁密陀僧辛平鎮驚劫痰止血消積殺蟲療腫毒滅瘢䵟治瘡痔出銀坑今以傾銀爐底代之白礬酸鹹寒性澀而收燥濕湧涎化痰除風止血通二便殺蟲除痼熱在骨髓生用解毒多服損心肺傷骨緑礬酸涼澀收能燥濕消積化痰利小便解毒殺蟲主治略同白礬煤炭甘辛溫治氣血痛及痰癇瘡傷中其毒者以冷水解之無名異甘鹹和血生肌治瘡傷石燕甘涼利竅行濕熱治淋帶目障石蟹鹹寒明目解金石藥毒立春節雨水甘平宜煎發散及補中益氣藥又立春清明二節貯水亦名神水浸造諸風脾胃虛損丹丸久留不壞小滿芒種白露三節雨水皆有毒造藥釀酒易壞飲之生脾胃疾梅雨水洗瘡疥滅瘢痕入醬易熟端午午時雨水宜造瘧痢瘡瘍蟲蠱諸丹丸神水端午午時有雨急伐竹竿中必有水名為神水甘寒清熱化痰定驚安神治心腹積聚及蟲病寒露冬至大寒小寒四節雨水宜浸造滋補藥及痰火積聚蟲毒丹丸臘日雨水與寒露冬至大寒小寒雨水同液雨水立冬後十日為入液至小雪為出液能殺百蟲宜煎殺蟲消積之藥霜甘寒解酒熱敷痱瘡臘雪水甘寒治時行瘟疫傷寒火暍抹痱春雪有蟲不用冰甘寒治傷寒陽毒昏迷解燒酒毒潦水甘平宜煎調脾胃去濕熱之藥降注雨水為潦淫雨亦為潦半天河竹籬頭及空樹穴中水也甘微寒治鬼邪蠱毒洗瘡東流水性順疾速通膈下關蕩滌邪穢逆流水性逆而倒上宣吐痰飲井水甘涼清熱助陰平旦新汲者佳醴泉甘平治鬼氣邪穢及心腹痼疾乳穴水近乳穴處流出之泉也甘溫久服肥健能食體潤不老玉井水有玉山內之泉水也甘平久服體潤毛髮不白溫泉辛熱微毒患癬疥風癩楊梅瘡者飽食入池久浴取汗阿井水甘鹹平性趨下清而且重治瘀濁及逆上之痰下膈止吐泉水出山岩間者是也甘平治霍亂煩悶嘔吐山有毒草惡石者不可用海水咸微溫有小毒浴風癬吐下宿食臚脹地漿甘寒陰中之陰治熱毒中暍解諸毒生熟湯調和陰陽治霍亂吐瀉虀水即作黃虀菜水也酸鹹吐痰飲宿食桑柴火能助藥力凡一切補藥諸膏宜此火煎之櫟炭火力緊宜煅煉金石藥烰炭火力慢宜烹煎炙焙百藥丸散蘆火其力不強不損藥力宜煎一切滋補藥竹火與蘆火同燈火去風解毒通經惟麻油蘇子油燃者可用余皆損目亦不治病燈花止血生肉敷金瘡治小兒夜啼黃土甘平治瀉痢熱毒兼解諸毒東壁土甘溫治瘟疫泄痢療瘡癬東壁得初日烘炙少火之氣壯取真火所照之土引真火發生之氣以補土勝濕或用南壁土取離火所照之氣用西壁土取西方收斂之氣皆借氣以補脾胃也伏龍肝多年灶心黃土對釜穴下者是也辛溫功專去濕亦能調中止血消腫催生釜臍墨辛溫止血消積治血病蠱毒傷寒陽毒塗金瘡百草霜灶突上煙煤也辛溫止血消積治血病及傷寒陽毒口舌諸瘡梁上塵辛苦微寒止血消積治噎膈中惡小兒軟瘡燒令煙盡篩取末用墨辛溫止血生肌塗癰腫鵝甘溫有毒發瘡動風火熏者尤甚血治反胃噎膈蛋甘溫補中益氣鴿鹹平解藥毒治瘡癬及人馬久患疥白色者入藥蛋解瘡毒痘毒屎名左盤龍治痞塊陰毒人馬瘡疥野鴿者尤良白丁香苦溫微毒消積治疝瘕積脹瘡疽咽噤齒目諸病象皮治金瘡長肌肉外用貓胞甘酸溫治反胃吐食肉治勞疰鼠瘻蠱毒豬獾甘酸平長肌肉治勞熱水脹狗獾甘酸平補中益氣小兒疳瘦者宜食之獺肝甘鹹溫殺蟲治傳尸癆療魚骨哽肉甘鹹寒治骨蒸血熱便祕消陽氣豭鼠矢甘微寒治傷寒勞復陰易腹痛兩頭尖者為雄鼠矢膽明目治聾肉治兒疳鼠瘻白蠟甘溫止血生肌補虛續筋骨原蠶砂二蠶矢也辛甘溫去風燥濕治風濕諸病炒尉患處亦良壁錢即蟢子窠治喉痹蟲牙痛及瘡口不斂緋帛治惡瘡腫毒作膏用又敷小兒臍未落時腫痛五色帛治墮馬及一切筋骨損拭盜汗鱭魚甘溫無毒發疥助火動痰鱸魚甘平有小毒和腸胃治水氣發瘡腫安胎鱖魚甘平無毒益氣力補虛去腹內惡血小蟲治腸風瀉血鮎魚療水腫利小便治口眼喎斜非佳品也勿多食黃顙魚甘平微毒發瘡疥消水腫利小便反荊芥害人河豚魚甘溫有大毒味雖美修治失法常殺人比目魚甘平無毒補虛益氣力多食動氣金魚甘鹹平治久痢海蛇鹹平治婦人積血小兒風疾瓦楞子甘鹹平消痰破血癖人骨治骨病臁瘡能接骨取焚葉者胎骨有毒服之傷生臍帶止瘧解胎毒敷臍瘡指甲性平治難産去目中翳障取孕婦指上者口津唾甘鹹平辟邪明目消腫毒月水咸熱而毒解毒箭治女勞復月經衣尉金瘡血湧燒服治虎狼傷及箭鏃入腹褲襠洗汁治女勞復燒灰治陰陽易男病用女女病用男取近陰處者攻蕘花苦辛微寒行水破積聚癥瘕蕩滌腸胃飲食痰飲治傷寒溫瘧敗蒲草名也破血治霍亂惡瘡跌撲瘀血藜蘆辛寒至苦治蠱毒喉痹殺蟲入口即吐風癇症用之服後吐不止者飲蔥湯即止與酒同用殺人䕡茹辛寒破血排膿蝕惡肉殺疥蟲常山辛苦寒性猛烈能引吐行水祛痰飲截瘧與甘草同用或生用多用則吐若酒浸炒透但用錢許未見其盡吐也馬鞭草苦微寒破血消脹殺蟲治癥瘕疽毒使君子甘溫殺蟲治小兒疳積多食傷脾食後飲熱茶作瀉天名精辛甘寒破血吐痰瀉熱解毒根名杜牛膝功用相同洗痔良劉寄奴苦溫破血下脹除症止金瘡血多服令人吐利續隨子辛溫行水破血解毒利腸長於利水而攻擊猛鷙虛者勿服研去油用鳳仙子微苦溫軟堅透骨通竅治産難骨哽消積塊最能損齒與玉簪根同花甘溫而滑活血消積治蛇傷根葉苦甘辛散血軟堅治杖撲腫痛雞魚骨哽及誤吞銅錢萆麻子辛甘熱能開通諸竅經絡出有形滯物利水氣拔毒外用屢效內服宜慎食萆麻一生不得食炒豆犯之脹死大楓子辛熱治瘡疥殺蟲劫毒杉木辛溫洗毒瘡漆瘡除心腹脹滿腳氣腫痛柞木苦平下行利竅催生用舊鑿柄上卷轉者尤佳肥皂辛溫瀉熱毒除風濕去垢膩療瘍毒乾漆辛溫毒烈功專行血殺蟲破年深積滯瘀血炒至煙盡用得蟹則成水八角金盤苦辛溫毒其氣猛烈療麻痹打撲瘀血萊蔔子辛溫破氣生用能吐風痰散風寒炒熟治喘嗽下痢消食止痛其治痰有沖牆倒壁之功銀硃辛溫燥烈破積滯劫痰涎兼療瘡疥殺蟲蝨水銀辛寒陰毒性滑重直入肉功專殺蟲解五金毒墮胎絶孕同棗肉人唾研則碎石灰辛溫毒烈燥濕散血生肌滅瘢疵殺瘡蟲風化者良古礦灰火毒已出治頑瘡斂瘡口砒石辛苦酸大熱大毒燥胸膈之痰可作吐藥殺蟲出信州錫之苗也煉者名砒霜尤烈礜石辛大熱而毒攻寒積性氣與砒石相近硇砂鹹苦辛熱消食破瘀熱毒之性能爛五金化人心為血硝石辛苦微咸大熱毒烈破積散堅鹼辛苦澀溫消食磨積去垢除痰點痣疣發麵䗪蟲鹹寒有毒搜剔血積接折傷治木舌通乳螻蛄鹹寒性急有毒行水腰以前甚澀能止二便腰以後甚利能通二便水蛭鹹苦平有毒破血治惡血積聚及丹毒可染須斑蝥辛寒毒專走下竅逐敗物治石淋瘰癧潰肉墮胎下猘犬毒外用蝕死肌敷瘡疥蜂房甘平有毒殺蟲治癰疽驚癇牙痛鼠婦酸溫微寒治氣癃月閉血瘕寒熱利水道墮胎蠐螬咸微寒有毒治血瘀痹氣脅下堅滿破折金瘡下乳療目疾以背反行者真蜣螂酸寒有毒主癲癇腹脹寒熱奔豚療瘡墮胎蛇蛻甘鹹而毒性竄善去風能殺蟲辟惡皂莢水洗炙用牙齒咸熱有毒為痘瘡劫劑散開金鎖苦平祛風濕穀精草辛溫輕浮明目兼治頭風喉痹木賊草甘苦平治目疾有升散火鬱風濕之功去節能發汗多服損肝青箱子苦微寒除風熱治目疾瞳子散大者勿服決明子甘苦鹹平祛風熱治目疾作枕能去頭風蔓荊子苦辛平升散搜風通利九竅治頭面風虛之症蟬蛻甘寒輕清散風熱發痘疹退目翳治皮膚瘡疹及小兒夜啼蚱蟬去熱治小兒驚癇夜啼又能下胞胎寒角蒿辛苦有小毒治惡瘡有蟲及口齒瘡蚤休苦微寒專理癰疽除蟲蛇毒兼治驚癇大薊甘苦涼破血退熱治吐衄腸癰小薊功用相同而力微紫花地丁辛苦寒瀉熱解毒治瘡疽白蘞苦辛甘寒除熱瀉火毒散結氣治瘡疽斂瘡方中多之赤蘞功用同元寶草辛寒補陰治吐血衄血金星草苦冷瀉熱消腫毒治癰疽並鮮丹石毒雀梅葉酸寒瀉熱解毒能治乳癰便毒木鱉子苦微甘治瀉痢瘡毒生肌除䵟專入外科番木鱉治喉痹消痞塊萬年青甘苦寒治咽喉急閉搗汁入醋用子可催生雪裡青苦大寒搗汁治咽喉急閉淡竹葉甘淡寒利小便除煩熱有走無守莖葉似竹非竹葉也冬葵子甘寒淡滑潤燥利二便通營衛消水腫滑胎根葉同功蜀葵花寒潤滑利治淋帶氣血燥雞冠花甘涼治痔漏下血痢疾崩帶子治腸風功用略同苗治瘡痔及血病山慈姑甘寒微辛清熱散結解毒景天苦酸寒純陰之品獨入離宮專清熱毒療火丹遊風海苔鹹寒軟堅消癭瘤結氣海藻苦鹹寒軟堅瀉熱消癭瘤結核及痰水濕熱海帶下水消癭功同海藻昆布功同海藻性雒而滑治癭瘤噎膈頑痰積聚側柏葉苦寒燥澀最清血分濕熱治一切血症風濕諸痹歷節風痛柏皮治火灼爛瘡長毛髮山茶花甘寒微辛涼血治吐衄用紅者胡桐淚苦鹹大寒入骨瀉熱軟堅殺蟲治咽喉口齒諸病棕櫚苦澀泄熱收脫燒黑能止遠年下血梓白皮苦寒除熱去三蟲治目疾甘李根皮大寒治心煩消渴氣逆奔豚木槿苦涼瀉熱活血潤燥治蟲癬作飲服令人得睡紫參苦辛微寒除腸胃大熱利竅通二便益精去心腹積聚腸中聚血療瘡腫治痢樗根皮苦寒燥濕熱澀腸入血分而澀血兼去肺胃陳痰治濕熱諸病有斷下之功椿皮功用與樗以相仿而力稍遜入丸散不入湯劑烏桕皮苦涼性沉而降利水通腸瀉熱毒西瓜甘寒解暑清熱利便多食傷脾助濕菱甘寒清暑安中多食損陽氣令人腹脹服暖姜酒即解茶苦甘微寒肅清上膈下氣消食去痰熱除煩渴清頭目醒昏睡能清神解酒食油膩燒炙之毒止痰厥頭痛與姜同煎治痢並能消暑孩兒茶以茶末埋土後熬成者苦澀微寒清上膈熱化痰生津止血收濕塗瘡腫荸薺甘寒而滑消食攻積除胸中實熱能毀銅水芹甘平去伏熱風熱利腸治崩帶黃病旱芹甘寒除煩熱散結下瘀血止霍亂莧菜甘冷除熱通九竅利腸滑胎治痢忌與鱉同食子祛肝風客熱明目馬齒莧酸寒散血祛風殺蟲利腸滑産治瘡亦忌鱉子明目菜瓜甘寒利腸胃去煩熱黃瓜甘寒清熱利水道王瓜即土瓜根苦寒瀉熱利水行血滑腸治天行熱疾主治略似栝蔞惟實熱壅滯者宜用之魚荊草辛微寒瀉熱解毒治瘡斷痁疾蔓菁子苦辛平瀉熱利水明目解毒敷瘡疽根解酒毒塗熱毒葉消食下氣蕨甘寒滑去暴熱利水亦可澄粉食海粉甘鹹寒潤化堅頑熱諸痰消癭瘤積塊治煩熱養陰氣醬鹹冷利解藥食湯火諸毒宜用豆醬凝水石辛鹹大寒能治時氣熱盛鵲甘寒消結熱去風通淋用雄者馬肉辛苦冷有毒不宜食白馬溺辛寒殺蟲消症兔屎辛平殺蟲明目解毒治癆疳瘡痔肉涼血解熱毒利腸五穀蟲寒治熱病毒痢療疳蝸牛鹹寒清火解熱治喉痹痔漏小兒驚癇解蜈蚣毒蜒蚰治瘡毒塗熱毒痔漏解蜈蚣毒尤良白頸蚯蚓鹹寒而性下行瀉熱利水治大熱療腎風腳氣蚯蚓泥甘寒瀉熱解毒治久痢腫毒蚌粉鹹寒解熱燥濕化痰消積明目止痢止嘔肉鹹冷功用相仿兼治崩帶痔瘻蜆粉與蚌粉同功肉亦與蚌肉同蜊殼鹹大寒洗鶴膝風塗濕爛瘡田螺甘大寒利濕清熱能引熱下行通二便治毒痢目赤痔瘡螺螄甘寒瀉熱利二便明目下水殼瀉濕熱治痰飲積胃脘痛及瘡痔湯火傷取泥中及牆上年久者海螄鹹寒瀉熱治瘰癧結木亥寬胸蟹鹹寒散血除熱通經續筋骨傷血動風蟹爪墮胎人中白咸涼降火散瘀治勞熱瘡疳熱草烏頭辛苦大熱搜風勝濕開頑痰治頑瘡以毒攻毒頗勝川烏然毒無所制不可輕投薑汁炒或豆腐煮胡椒辛大熱溫中快膈下氣消痰解毒治胃寒吐水齒痛最能僭上畢澄茄即胡椒之大者乃一類二種也主治略同虎骨辛溫屬金而制水追風健骨定痛辟邪治頭風驚癇用頭骨手足風用脛骨肉酸平益氣力止唾闢精魅肚治反胃睛治小兒夜啼瓜辟邪鬼附余人參丹參沙參苦參元參紫參細辛芍藥皆與藜蘆相反大戟芫花甘遂海藻皆與甘草相反半夏栝蔞貝母白蘞白芨皆與烏頭相反石決明反雲母硫黃反芒硝烏頭反犀角水銀反砒霜巴豆反牽牛丁香反鬱金芒硝反三稜肉桂反石脂藜蘆反酒黃顙魚反荊芥蔥韭與蜜俱相反醋與蛤肉相反牛乳與酸物生魚相反人參畏五靈脂狼毒畏密陀僧蝟皮與桔梗麥冬相惡之類大抵相反則彼我交仇不宜合用非比相畏相惡尚可制伏也按人參畏五靈脂惡皂莢反藜蘆而東垣交泰丸用人參皂莢是惡而不惡也古方療月閉四物湯加人參五靈脂是畏而不畏也又治痰在胸膈人參藜蘆同用而取其湧越是激其怒性也又甘草反大戟芫花甘遂海藻而胡洽治痰癖十棗湯以芫花大戟甘遂煎棗湯入藥末加甘草東垣治結核甘草與海藻同用丹溪治勞瘵甘草與芫花同用又黃耆畏防風而玉屏風散防風與黃耆同用牛黃惡龍骨而龍骨得牛黃反良非洞奧達權不能知也凡藥根升而梢降五味主用苦泄甘緩酸收咸軟淡滲泄辛散辛甘發散為陽酸苦湧泄為陰苦藥平升微寒平亦升甘辛藥平降甘寒瀉火苦寒瀉濕熱苦甘寒瀉血熱味之薄者陰中之陽酸苦鹹平是也味之厚者陰中之陰酸苦鹹寒是也氣之厚者陽中之陽辛甘溫熱是也氣之薄者陽中之陰辛甘淡平涼寒是也大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九毋太過也
