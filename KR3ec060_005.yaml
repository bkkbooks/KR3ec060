body:
  text: 同名附考草類粉沙參即土參出江浙救窮草即黃精似玉竹者俗呼玉竹黃精又一種似白芨俗呼白芨黃精又呼山生薑萎蕤即玉竹野白朮俗呼天生術定風草即天麻莖名赤箭甜桔梗即薺苨一名空沙參乃一類二種也仙靈脾一名淫羊藿胡王使者即羌活山漆亦作三七略似人參俗呼參三七野丈人即白頭翁亦名胡王使者枯芩黃芩之中空者亦名片芩條芩黃芩之中實者亦名子芩鶴蝨即天名精子蘭草亦名大澤蘭俗呼省頭草蘭澤草香草蓋蘭草澤蘭一類二種也芎藭川産者佳故稱川芎蓬莪朮即莪朮一名蓬朮亦作蓬莪朮金盞銀臺即王不留行莎草根即香附青木香即廣木香縮砂密即砂仁草果亦名草豆蔻肉豆蔻一名肉果蓽茇茇一作撥假蘇即荊芥補骨脂一名破故紙薄苛一作薄荷龍腦薄荷一名雞蘇亦名水蘇紅豆蔻即良薑子𠲿𠲿草一名白米飯草亦名糯米飯草紅藍花即紅花扁竹一名萹蓄瞿麥俗呼其花為洛陽花黃花果即佛耳草一名鼠麴草鱧腸即旱蓮草一名金陵草女菀即紫菀之白者草決明一名青葙子野雞冠子也茺蔚即益母草棉花即木棉烏頭即附子之母附生者為附子細長者為天雄連生者為側子尖名烏附尖烏喙即草烏頭虎掌即南星為末入牛膽名膽星黑醜即牽牛子之黑者大力子即牛旁子一名鼠黏子又名惡實白鶴仙即玉簪地松即天名精一名活鹿草又名蝦蟆藍杜牛膝即天名精根烏翣一名射干又名烏扇貫衆一作管仲千金子即續隨子重樓金線一名蚤休生軍即大黃之生用者如制熟名制軍大黃極寒硫黃極熱故並號將軍凌霄花即紫葳花蜀黍即常山莖葉急性子即鳳仙子其花亦名金鳳花野天門冬即百部過山龍即茜草忍冬藤即銀花藤葉金銀花亦呼銀花土青木香即馬兜鈴根栝樓俗作瓜蔞花粉即瓜蔞根交藤即何首烏赤者外科稱為瘡帚木通古稱通草通草古稱通脫木番萊蔔子即胡盧巴骨碎補即猴姜俗稱申姜旋花即旋葍亦名鼓子花其花不作瓣狀如軍中所吹鼓子故名千葉者似牡丹俗呼纏枝牡丹金沸草一名旋覆花木斛即石斛之味苦者芣苡即車前子慎火草一名景天俗呼火焰草血見愁一名地錦俗稱血竭又名醬瓣草蜀葵子即冬葵子仙遺糧即土茯苓俗呼冷飯糰卷耳即蒼耳子一名葈耳又名羊負來千年蒕一名萬年青過冬青一名雪裡青青木香藤一名天仙藤鬧羊花子一名土連翹金燈籠即山慈姑又名毛姑營實即薔薇子月季花一名月月紅鳳尾草一名金星草又名七星草相思草即煙木類瀝青即松香一名松脂木犀花即桂花夜合即合歡皮文武實即桑椹冬青女貞子與冬青古分二種實一物也薰陸香即乳香龍腦香即冰片麒麟竭即血竭白膠香一名楓香脂雞舌香即丁香之雌者亦名母丁香雄者名公丁香安息香安息國名也紫金藤即降香蘇合香即蘇合油槐角即槐實訶黎勒即訶子剛子即巴豆杉材即杉木鑿子木即柞木無食子一名沒石子木筆花即辛夷一名迎春花皂莢即皂角蘇方木即蘇木天精草即地骨皮之葉谷實即楮實白桵即蕤仁貓兒刺即老鼠刺一名八角茶又名狗骨南天燭一名南燭即楊桐也金鈴子即川楝子赤柳柳一名西河柳黃松節即茯神心中木香椿根皮即椿皮臭椿皮即樗根皮臭橘葉一作枸橘果類益智即龍眼肉俗名桂圓棠球子即山楂橘皮即廣皮橘之青者名青皮廣皮去白名橘紅陳者名陳皮香欒即香團柚之屬也小者為蜜筒大者為朱欒最大者為香欒香椽即佛手柑古作枸椽銀杏即白果雞頭子一名芡實木蜜即枳椇子俗名雞距子亦名木餳藕實即蓮子林檎即花紅鹿蔥即萱草亦作諼草又名宜男草忘憂草瓜丁即甜瓜蒂一名苦丁香甜瓜即俗呼熟瓜者是烏芋即荸薺亦名地栗芰實即菱亦名菱角大腹檳榔即大腹皮子蜀椒即川椒去殼名椒紅秦椒俗稱花椒畢澄茄即胡椒之大者乃一類二種也茶古名茗苦茶即臘茶菜類薯蕷即山藥結藤上者名零餘子山薯即甘薯黑姜即炮姜藠子即薤白葫即大蒜蒫實即薺菜子亦名菥蓂子茼蒿即蓬蒿菜莙薘菜即菾菜菘菜即白菜蕓薹即油菜紫英即紫菜黃瓜菜即黃花菜石發一名龍鬚菜萵苣即萵苣筍生菜亦名白苣雞腳菜即石花菜菰筍即茭白一名茭筍亦名菰菜根名菰根實名雕胡米天羅即絲瓜一名蠻瓜白瓜即冬瓜胡瓜即黃瓜王瓜即土瓜根非黃瓜也諸葛菜一名蔓菁子即蕪菁越瓜即菜瓜亦名梢瓜蘿蔔子一作萊蔔子匏瓜即葫蘆一作壺盧落蘇即茄子蒔蘿即小茴香舶茴香即八角茴香蘹香即大茴香地菌一名土菌蕺一名魚腥草穀類薏苡仁即米仁火麻即麻仁一名黃麻巨勝子胡麻之八稜者是也壁蝨胡麻一名亞麻小粉小麥澄出粉也膠飴即飴糖雀麥即野麥稻即黍米占米即秈米米瀋即米泔黍稷之不黏者為黍粟即小米粱之小者是也粱粟之大者為粱自然谷一名蒒草子亦名禹餘糧守氣一名𦱌草米黃米一名秫即粟粱之黏者茭米一名菰米蜀黍即高粱一名蘆穄俗名蜀秫又名蘆粟玉高粱一名玉蜀黍黑豆小者名馬料豆龍瓜粟一名穇子又名鴨爪粟飯豆一名白豆赤小豆緊小黯赤者入藥稍大而鮮紅者不治病米紅米黑者是相思子亦名紅豆豆蘖即大豆黃卷貍豆一作黎豆苦酒即米醋古名醯御米殼即罌粟殼其花名麗春花阿芙蓉即鴉片一名阿罌粟花之精液也金石類銅青即銅緑鐵落即鐵屑煅時砧上打落者是也又如塵飛起者名鐵精鹽醋浸出者名鐵華器物生衣者名鐵鏽作針家細末名針砂水粉即鉛粉亦名宮粉又名胡粉錫粉定粉瓦粉白粉鉛丹即黃丹系黑鉛煉成吸鐵石一名磁石海石亦名浮石信石即砒石生者名砒黃煉者名砒霜錫苗也焰硝一名硝石亦名火硝寒水石一名凝水石鹽精結成按古方所用寒水石即凝水石唐末諸方所用寨水石即石羔也花乳石即花芷石箭鏃砂即硃砂亦名辰砂雄黃生山之陽者名雄黃生山之陰者名雌黃劣者名薰黃芒硝朴硝刮滷煎煉在底者名為朴硝即皮硝在上者為芒硝亦名盆硝有牙者名馬牙硝風化者名風化硝地龍骨即古礦灰石炭即煤炭石膽即膽礬産銅坑中銅之精液也白礬用火升者為礬精再以醋化者為礬華青礬一名緑礬亦名皂礬煆赤者名絳礬戎鹽一名青鹽鵝管即鍾乳水類黴雨水即梅雨水藥雨水即液雨水上池水一名半天河井水平旦新汲者名井華水甘泉一名醴泉溫湯即溫泉廬山是硫磺泉新安黃山是硃砂泉長安驪山是礜石泉又出砒石處亦有溫泉土漿即地漿掘黃土地作坎深三尺以新汲水沃入攪濁少頃取清者用勞水一名甘爛水又名揚汛水用流水二斗置大盆中以杓高揭之千萬遍有沸珠相逐乃取用太和湯即百沸湯一名麻沸湯陰陽水即生熱湯用新汲水百沸湯對合和勻土類百草霜即灶突上煙煤釜煤一名釜臍墨亦名釜底墨烏龍尾一名梁上塵即倒掛塵禽類燕蔬即燕窩雞內金即雞肫皮一名䏶胵雞矢醴即雞屎白惟雄雞屎乃有白鶩即鴨鳧即野鴨鵓鴿即鴿鴿屎一名左盤龍雀老而斑者為麻雀小而黃口者為黃雀雀矢一名白丁香土燕一名禽石燕似蝙蝠而口方食石乳汁野雞即雉雞鸊鷉一名油鴨又名刁鴨淗鵝油一名鵜鶘油天鼠矢一名夜明砂蝙蝠矢也砂皆蚊眼獸類當門子即麝香牛黃即犀牛之黃稱犀黃活牛吐黃時收得者為生黃殺后角中得者名角黃心中得者名心黃肝膽中得者名肝膽黃成塊成粒均不及生者如非犀牛功力遠遜斑龍鹿之別名黃明膠即牛皮膠狗道家以狗為地厭雁為天厭魚鳥為水厭皆不宜食溫肭臍即海狗腎貒即豬獾天狗即狗獾刺蝟皮蝟古作匯俗名刺血明月砂即兔屎蟲類蟬蛻蛻俗作退蚊蟲即虻蟲名蜚蟲地鱉蟲即䗪蟲馬蟥一名水蛭癩蝦蟆一名蟾蜍眉間白汁名蟾酥桑蟲即桑蟲古名桑蠹又名桑蠍斑蝥一作斑貓食芫花者為蚖青春生食葛花者為葛上亭長夏生食豆花者為斑蝥秋生至冬入地則為地膽乃一物而四時變化者即蛆即蜈蚣黑兜蟲一名九香蟲蛙即田雞白蠟蟲食冬青樹汁化為白脂溶煮而成者唐宋以前所用皆蜜白蠟自元以來始用蟲白蠟蠍全用謂之全蠍尾名蠍稍文蛤一名五倍子蟲食鹽膚木汁遺種於桑間者故功與鹽膚子葉相同造釀作餅名百藥煎蝸牛蜒蚰之負殼而行者無殼名蜒蚰六一泥一名蚯蚓泥即蚯蚓屎也推丸一名蜣螂大者名胡蜣螂糞蛆一名五穀蟲地雞一名鼠婦亦名濕生蟲常著鼠背故又名鼠負蟢子窠一名壁錢魚類鱮魚即鰱魚鯇魚即草魚魴魚即鯿魚鱧魚一名烏魚即七星魚俗呼烏鱧魚江魚一名石首魚又名黃花魚海螵蛸一名烏賊骨亦作烏鰂骨其魚亦名墨魚鰍魚即泥鰍刺參一名海參箬魚即比目魚薊花魚本名鱖魚鱠殘魚或謂即銀魚鱗介類鯪鯉一名穿山甲蛤蚧雄為蛤雌為蚧魁蛤一名瓦楞子又名瓦屋子俗呼蚶子車蛤一名西施舌麥螺即吐鐵亦名梅螺𤥐琑即蜊殼一名海鏡一名海月又名蠣鏡俗呼明瓦蝸螺即螺螄文蛤蛤蜊之屬五倍子亦名文蛤取其形似爾白花蛇即蘄蛇人類血餘即發人胞一名紫河車一名混肫皮又混肫衣坎氣即臍帶一名命蒂紅鉛即月水亦名月經月信又名天癸糞清一名金汁還元水即童便飲自己溺名回輪酒秋冰秋石之再升者溺白垽即人中白
